<!DOCTYPE html>
<html>
<head>
    <title>Movie Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
        background-color: #141414;
        color: white;
    }

    .navbar {
        background-color: #000;
    }

    .brand {
        color: red;
        font-weight: bold;
        font-size: 24px;
    }

    .card {
        background-color: #1f1f1f;
        border-radius: 10px;
        padding: 10px;
        color: white;
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.08);
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
    }

    h5 {
        color: #ffffff;
        font-weight: bold;
    }

    p {
        color: #cccccc;
        margin: 2px 0;
    }

    .rating {
        color: gold;
        font-size: 18px;
        font-weight: bold;
    }

    .btn-danger {
        background-color: red;
        border: none;
    }

    .btn-danger:hover {
        background-color: darkred;
    }

    input {
        background-color: #222 !important;
        color: white !important;
        border: 1px solid #444 !important;
    }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar px-4">
    <span class="brand">🎬 MovieExplorer</span>
</nav>

<div class="container mt-4">

    <!-- Search -->
    <form action="/search" method="post">
        <input type="text" name="movie" class="form-control" placeholder="Search movie...">
        <br>
        <button class="btn btn-danger">Search</button>
    </form>

    <!-- Movies Grid -->
    <div class="row mt-4">

        {% for movie in movies %}
        <div class="col-md-3 mb-4">
            <div class="card p-3">

                <h5>{{ movie['Movie Name'] }}</h5>
		<img src="{{ movie.poster }}" class="img-fluid rounded">
                <p>🎭 {{ movie['Genre'] }}</p>
                <p>🌐 {{ movie['Language'] }}</p>
                <p>📅 {{ movie['Year'] }}</p>

                <p class="rating">⭐ {{ movie['IMDb Rating'] }}</p>

                <p>🎬 {{ movie['Director'] }}</p>
                <p>📺 {{ movie['OTT Platform'] }}</p>

            </div>
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
